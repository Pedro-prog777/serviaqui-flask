services:
  - type: web
    name: serviaqui
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: BASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
