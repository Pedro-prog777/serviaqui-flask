{% extends 'base.html' %}

{% block content %}
<section class="page-hero compact">
  <div class="container">
    <article class="surface-card legal-card">
      <p class="eyebrow">Erro {{ error_code }}</p>
      <h1>{{ error_title }}</h1>
      <p class="lead">{{ error_message }}</p>
      <nav class="hero-actions" aria-label="Ações disponíveis">
        <a class="btn btn-brand" href="{{ error_action_url }}">{{ error_action_label }}</a>
        <a class="btn btn-outline-brand" href="{{ url_for('page_contact') }}">Falar com a equipe</a>
      </nav>
    </article>
  </div>
</section>
{% endblock %}
