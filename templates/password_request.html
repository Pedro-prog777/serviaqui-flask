{% extends 'base.html' %}

{% block content %}
<section class="section-block">
  <div class="container narrow-shell">
    <form id="passwordRequestForm" class="surface-card form-shell" novalidate>
      <header class="card-head">
        <p class="eyebrow">Recuperação</p>
        <h1>Solicitar redefinição de senha</h1>
      </header>
      <label class="form-label" for="passwordRequestName">Nome</label>
      <input id="passwordRequestName" class="form-control">
      <label class="form-label mt-3" for="passwordRequestEmail">E-mail</label>
      <input id="passwordRequestEmail" type="email" class="form-control" required>
      <label class="form-label mt-3" for="passwordRequestNote">Observação</label>
      <textarea id="passwordRequestNote" class="form-control" rows="4"></textarea>
      <div class="form-actions mt-4">
        <button class="btn btn-brand" type="submit">Solicitar link</button>
      </div>
      <p class="form-feedback" id="passwordRequestFeedback" aria-live="polite"></p>
    </form>
  </div>
</section>
{% endblock %}
