{% extends 'base.html' %}

{% block content %}
<section class="section-block">
  <div class="container narrow-shell">
    <form id="passwordResetForm" class="surface-card form-shell" novalidate>
      <header class="card-head">
        <p class="eyebrow">Redefinição</p>
        <h1>Criar nova senha</h1>
        <p id="passwordResetStatus">Validando link...</p>
      </header>
      <label class="form-label" for="passwordResetPassword">Nova senha</label>
      <input id="passwordResetPassword" type="password" class="form-control" required>
      <div class="form-actions mt-4">
        <button class="btn btn-brand" type="submit">Atualizar senha</button>
      </div>
      <p class="form-feedback" id="passwordResetFeedback" aria-live="polite"></p>
    </form>
  </div>
</section>
{% endblock %}
